<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="apBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2340"/>
      <stop offset="100%" stop-color="#2D4B7E"/>
    </linearGradient>
    <radialGradient id="apGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3DAFB9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3DAFB9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="apHand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6BC8D2"/>
      <stop offset="100%" stop-color="#3DAFB9"/>
    </linearGradient>
    <linearGradient id="apHand2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#6BC8D2"/>
      <stop offset="100%" stop-color="#3DAFB9"/>
    </linearGradient>
  </defs>

  <rect width="700" height="560" fill="url(#apBg)"/>
  <rect width="700" height="560" fill="url(#apGlow)"/>

  <!-- Arabesque background pattern -->
  <g opacity="0.15" fill="none" stroke="#6BC8D2">
    <g transform="translate(120 100)">
      <path d="M0,-50 L14.5,-14.5 L50,0 L14.5,14.5 L0,50 L-14.5,14.5 L-50,0 L-14.5,-14.5 Z" stroke-width="1.5"/>
    </g>
    <g transform="translate(580 460)">
      <path d="M0,-45 L13,-13 L45,0 L13,13 L0,45 L-13,13 L-45,0 L-13,-13 Z" stroke-width="1.5"/>
    </g>
    <g transform="translate(600 130)">
      <circle r="55" stroke-dasharray="3 6"/>
      <circle r="40"/>
    </g>
    <g transform="translate(100 430)">
      <circle r="50" stroke-dasharray="4 8"/>
    </g>
  </g>

  <!-- Central handshake -->
  <g transform="translate(350 280)">
    <!-- Glow behind -->
    <circle r="140" fill="url(#apGlow)"/>
    <circle r="120" fill="#3DAFB9" fill-opacity="0.08" stroke="#6BC8D2" stroke-opacity="0.3" stroke-width="1"/>

    <!-- Left hand (thobe cuff, Saudi male attire hint) -->
    <g transform="translate(-140 20)">
      <!-- Sleeve/cuff -->
      <path d="M-40,-30 L60,-30 L60,50 L-40,50 Z" fill="#F8FAFC" opacity="0.95"/>
      <path d="M-40,-30 L60,-30" stroke="#3DAFB9" stroke-width="2" opacity="0.7"/>
      <path d="M-40,-24 L60,-24" stroke="#6BC8D2" stroke-width="1" opacity="0.4"/>
      <!-- Watch (subtle) -->
      <rect x="-25" y="-8" width="20" height="14" rx="3" fill="#0F2340" opacity="0.8"/>
      <rect x="-22" y="-5" width="14" height="8" fill="#6BC8D2" opacity="0.7"/>
      <!-- Hand -->
      <path d="M60,-25 C90,-25 130,-10 145,10 C155,25 150,40 130,45 L80,45 C60,45 55,35 55,20 L55,-15 Z" fill="url(#apHand)"/>
    </g>

    <!-- Right hand (blazer cuff, Saudi female professional attire) -->
    <g transform="translate(140 20)">
      <!-- Sleeve/blazer -->
      <path d="M-60,-30 L40,-30 L40,50 L-60,50 Z" fill="#2D4B7E"/>
      <path d="M-60,-30 L40,-30" stroke="#6BC8D2" stroke-width="2" opacity="0.5"/>
      <path d="M-60,-22 L40,-22" stroke="#3DAFB9" stroke-width="1" opacity="0.5"/>
      <!-- Hand -->
      <path d="M-60,-25 C-90,-25 -130,-10 -145,10 C-155,25 -150,40 -130,45 L-80,45 C-60,45 -55,35 -55,20 L-55,-15 Z" fill="url(#apHand2)"/>
    </g>

    <!-- Interlocking handshake center -->
    <g transform="translate(0 20)">
      <path d="M-40,-20 Q-20,-25 0,-20 Q20,-25 40,-20 L40,25 Q20,30 0,25 Q-20,30 -40,25 Z"
            fill="url(#apHand)" opacity="0.95"/>
      <!-- Fingers detail -->
      <path d="M-30,-15 Q-25,-8 -30,0" stroke="#0F2340" stroke-width="1" fill="none" opacity="0.35"/>
      <path d="M-15,-18 Q-10,-8 -15,2" stroke="#0F2340" stroke-width="1" fill="none" opacity="0.35"/>
      <path d="M0,-18 Q5,-8 0,2" stroke="#0F2340" stroke-width="1" fill="none" opacity="0.35"/>
      <path d="M15,-18 Q20,-8 15,2" stroke="#0F2340" stroke-width="1" fill="none" opacity="0.35"/>
      <path d="M30,-15 Q35,-8 30,0" stroke="#0F2340" stroke-width="1" fill="none" opacity="0.35"/>
    </g>

    <!-- Trust sparkles emanating -->
    <g>
      <g transform="translate(-90 -80)"><path d="M0,-6 L2,-2 L6,0 L2,2 L0,6 L-2,2 L-6,0 L-2,-2 Z" fill="#6BC8D2"/></g>
      <g transform="translate(90 -85)"><path d="M0,-5 L1.5,-1.5 L5,0 L1.5,1.5 L0,5 L-1.5,1.5 L-5,0 L-1.5,-1.5 Z" fill="#6BC8D2"/></g>
      <g transform="translate(0 -110)"><path d="M0,-8 L2.5,-2.5 L8,0 L2.5,2.5 L0,8 L-2.5,2.5 L-8,0 L-2.5,-2.5 Z" fill="#3DAFB9"/></g>
    </g>
  </g>

  <!-- Trust text badge -->
  <g transform="translate(350 460)">
    <rect x="-90" y="-18" width="180" height="36" rx="18" fill="#0F2340" stroke="#3DAFB9" stroke-opacity="0.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial" font-weight="800" font-size="15" fill="#6BC8D2">شراكة موثوقة</text>
  </g>

  <!-- Corner sparkles -->
  <g opacity="0.65">
    <circle cx="80" cy="80" r="3" fill="#6BC8D2"/>
    <circle cx="620" cy="80" r="3.5" fill="#3DAFB9"/>
    <circle cx="80" cy="500" r="2.5" fill="#3DAFB9"/>
  </g>
</svg>
