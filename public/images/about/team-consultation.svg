<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 990" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="atSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F8FCFD"/>
      <stop offset="60%" stop-color="#EAF6F7"/>
      <stop offset="100%" stop-color="#DDEEF0"/>
    </linearGradient>
    <linearGradient id="atSand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E3C5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#EAD1A8" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="atThobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="atBlazer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B609B"/>
      <stop offset="100%" stop-color="#2D4B7E"/>
    </linearGradient>
    <linearGradient id="atSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D5B5"/>
      <stop offset="100%" stop-color="#E8BE93"/>
    </linearGradient>
    <linearGradient id="atTower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DAFB9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2D4B7E" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="atSun" cx="70%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#FFF4D9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFF4D9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="atGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#2D4B7E" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Sky/background -->
  <rect width="900" height="990" fill="url(#atSky)"/>
  <rect width="900" height="990" fill="url(#atGrid)"/>
  <rect width="900" height="990" fill="url(#atSun)"/>

  <!-- Distant desert dunes (very subtle) -->
  <path d="M0,660 C220,620 380,650 560,610 C700,580 800,600 900,570 L900,720 L0,720 Z" fill="url(#atSand)"/>
  <path d="M0,700 C180,680 320,690 500,670 C640,655 770,665 900,650 L900,720 L0,720 Z" fill="#EAD1A8" fill-opacity="0.28"/>

  <!-- ═════ Arabesque backdrop pattern ═════ -->
  <g opacity="0.10" fill="none" stroke="#2D4B7E">
    <g transform="translate(160 140)">
      <path d="M0,-70 L20,-20 L70,0 L20,20 L0,70 L-20,20 L-70,0 L-20,-20 Z" stroke-width="1.5"/>
      <path d="M0,-46 L14,-14 L46,0 L14,14 L0,46 L-14,14 L-46,0 L-14,-14 Z" stroke-width="1"/>
    </g>
    <g transform="translate(730 180)">
      <circle r="70" stroke-dasharray="3 7"/>
      <circle r="50"/>
    </g>
    <g transform="translate(770 105)">
      <path d="M0,-40 L12,-12 L40,0 L12,12 L0,40 L-12,12 L-40,0 L-12,-12 Z" stroke-width="1.2"/>
    </g>
  </g>

  <!-- ═════ Riyadh skyline silhouette ═════ -->
  <g transform="translate(0 660)" opacity="0.85">
    <!-- Left cluster -->
    <rect x="20"  y="-58" width="34" height="58" rx="2" fill="url(#atTower)" opacity="0.55"/>
    <rect x="60"  y="-88" width="26" height="88" rx="2" fill="url(#atTower)" opacity="0.6"/>
    <rect x="92"  y="-50" width="30" height="50" rx="2" fill="url(#atTower)" opacity="0.5"/>
    <rect x="128" y="-72" width="24" height="72" rx="2" fill="url(#atTower)" opacity="0.55"/>
    <rect x="158" y="-42" width="28" height="42" rx="2" fill="url(#atTower)" opacity="0.5"/>
    <rect x="192" y="-95" width="32" height="95" rx="3" fill="url(#atTower)" opacity="0.65"/>
    <rect x="230" y="-60" width="26" height="60" rx="2" fill="url(#atTower)" opacity="0.55"/>
    <rect x="262" y="-80" width="22" height="80" rx="2" fill="url(#atTower)" opacity="0.6"/>
    <rect x="290" y="-50" width="24" height="50" rx="2" fill="url(#atTower)" opacity="0.5"/>

    <!-- Kingdom Tower (iconic Riyadh landmark, center) -->
    <g transform="translate(410 0)">
      <path d="M-38,0 L-38,-220 L-22,-255 L-22,-278 L-10,-278 L-10,-315 C-10,-325 -4,-330 0,-330 C4,-330 10,-325 10,-315 L10,-278 L22,-278 L22,-255 L38,-220 L38,0 Z"
            fill="url(#atTower)"/>
      <!-- Iconic hole/arch -->
      <path d="M-14,-220 L-14,-250 L14,-250 L14,-220 Z" fill="url(#atSky)"/>
      <path d="M-14,-220 L-14,-250 L14,-250 L14,-220 Z" fill="none" stroke="#2D4B7E" stroke-opacity="0.4" stroke-width="1"/>
      <!-- Antenna -->
      <line x1="0" y1="-330" x2="0" y2="-352" stroke="#2D4B7E" stroke-opacity="0.5" stroke-width="1.2"/>
      <circle cx="0" cy="-354" r="2" fill="#3DAFB9"/>
      <!-- Windows highlights -->
      <g opacity="0.45" fill="#6BC8D2">
        <rect x="-30" y="-170" width="4" height="4"/><rect x="-22" y="-170" width="4" height="4"/><rect x="-14" y="-170" width="4" height="4"/><rect x="10" y="-170" width="4" height="4"/><rect x="18" y="-170" width="4" height="4"/><rect x="26" y="-170" width="4" height="4"/>
        <rect x="-30" y="-140" width="4" height="4"/><rect x="-22" y="-140" width="4" height="4"/><rect x="18" y="-140" width="4" height="4"/><rect x="26" y="-140" width="4" height="4"/>
        <rect x="-30" y="-100" width="4" height="4"/><rect x="-14" y="-100" width="4" height="4"/><rect x="10" y="-100" width="4" height="4"/><rect x="26" y="-100" width="4" height="4"/>
      </g>
    </g>

    <!-- Al-Faisaliah Tower (ball-topped, right of center) -->
    <g transform="translate(520 0)">
      <path d="M-20,0 L-8,-160 L8,-160 L20,0 Z" fill="url(#atTower)" opacity="0.75"/>
      <circle cx="0" cy="-172" r="14" fill="url(#atTower)" opacity="0.75"/>
      <line x1="0" y1="-186" x2="0" y2="-205" stroke="#2D4B7E" stroke-opacity="0.5" stroke-width="1"/>
    </g>

    <!-- More buildings right -->
    <rect x="560" y="-100" width="34" height="100" rx="2" fill="url(#atTower)" opacity="0.55"/>
    <rect x="600" y="-70"  width="26" height="70"  rx="2" fill="url(#atTower)" opacity="0.5"/>
    <rect x="632" y="-140" width="42" height="140" rx="3" fill="url(#atTower)" opacity="0.6"/>
    <rect x="682" y="-85"  width="26" height="85"  rx="2" fill="url(#atTower)" opacity="0.55"/>
    <rect x="714" y="-105" width="34" height="105" rx="2" fill="url(#atTower)" opacity="0.6"/>
    <rect x="754" y="-60"  width="24" height="60"  rx="2" fill="url(#atTower)" opacity="0.5"/>
    <rect x="784" y="-80"  width="30" height="80"  rx="2" fill="url(#atTower)" opacity="0.55"/>
    <rect x="820" y="-52"  width="28" height="52"  rx="2" fill="url(#atTower)" opacity="0.5"/>
    <rect x="854" y="-72"  width="26" height="72"  rx="2" fill="url(#atTower)" opacity="0.55"/>
  </g>

  <!-- ═════ Palm trees framing ═════ -->
  <g transform="translate(60 690)" opacity="0.7">
    <path d="M0,0 C-3,-90 -3,-160 0,-220" stroke="#2D4B7E" stroke-width="3.2" fill="none" stroke-linecap="round" opacity="0.55"/>
    <g stroke="#3DAFB9" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M0,-220 C-38,-235 -68,-230 -92,-215"/>
      <path d="M0,-220 C38,-235 68,-230 92,-215"/>
      <path d="M0,-225 C-30,-260 -55,-278 -78,-278"/>
      <path d="M0,-225 C30,-260 55,-278 78,-278"/>
      <path d="M0,-225 C-14,-275 -17,-305 -7,-320"/>
      <path d="M0,-225 C14,-275 17,-305 7,-320"/>
    </g>
    <!-- Dates cluster -->
    <g fill="#D97706" opacity="0.65">
      <circle cx="-6" cy="-208" r="2"/>
      <circle cx="6"  cy="-210" r="2"/>
      <circle cx="0"  cy="-212" r="2"/>
      <circle cx="-3" cy="-204" r="2"/>
    </g>
  </g>
  <g transform="translate(845 690)" opacity="0.65">
    <path d="M0,0 C-3,-80 -3,-140 0,-190" stroke="#2D4B7E" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.55"/>
    <g stroke="#3DAFB9" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M0,-190 C-32,-203 -58,-198 -78,-183"/>
      <path d="M0,-190 C32,-203 58,-198 78,-183"/>
      <path d="M0,-195 C-24,-225 -45,-238 -64,-236"/>
      <path d="M0,-195 C24,-225 45,-238 64,-236"/>
      <path d="M0,-198 C-10,-238 -12,-262 -5,-274"/>
      <path d="M0,-198 C10,-238 12,-262 5,-274"/>
    </g>
  </g>

  <!-- ═════ Meeting table (foreground) ═════ -->
  <g transform="translate(450 780)">
    <!-- Table shadow -->
    <ellipse cx="0" cy="14" rx="260" ry="14" fill="#2D4B7E" fill-opacity="0.08"/>
    <!-- Table top -->
    <ellipse cx="0" cy="0" rx="255" ry="26" fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.55" stroke-width="1.5"/>
    <ellipse cx="0" cy="-4" rx="255" ry="24" fill="#F1FAFB"/>
    <!-- Wood grain hint -->
    <ellipse cx="0" cy="-4" rx="240" ry="20" fill="none" stroke="#3DAFB9" stroke-opacity="0.25" stroke-width="0.8"/>

    <!-- Traditional Saudi dallah (coffee pot) — LEFT -->
    <g transform="translate(-155 -46)">
      <!-- Body -->
      <path d="M-16,0 L-18,-8 L-15,-30 L-8,-42 L8,-42 L15,-30 L18,-8 L16,0 Z" fill="#B78645"/>
      <path d="M-14,0 L-16,-8 L-13,-28 L-7,-38 L7,-38 L13,-28 L16,-8 L14,0 Z" fill="#D4A76A"/>
      <!-- Beak -->
      <path d="M14,-30 C22,-30 26,-24 22,-16" stroke="#B78645" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M22,-16 L28,-14 L22,-10 Z" fill="#B78645"/>
      <!-- Handle -->
      <path d="M-16,-30 C-24,-30 -26,-22 -22,-16 L-18,-8" stroke="#B78645" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Lid finial -->
      <path d="M-4,-42 L-6,-48 L6,-48 L4,-42 Z" fill="#B78645"/>
      <path d="M0,-48 L-2,-54 L2,-54 Z" fill="#B78645"/>
      <!-- Base -->
      <ellipse cx="0" cy="0" rx="18" ry="4" fill="#8B5E2B"/>
    </g>

    <!-- Finjan cups (small handleless coffee cups) -->
    <g transform="translate(-95 -18)">
      <path d="M-10,0 L10,0 L8,14 L-8,14 Z" fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.6" stroke-width="1"/>
      <ellipse cx="0" cy="0" rx="10" ry="2.5" fill="#5A2D0A" opacity="0.7"/>
    </g>
    <g transform="translate(-65 -18)">
      <path d="M-10,0 L10,0 L8,14 L-8,14 Z" fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.6" stroke-width="1"/>
      <ellipse cx="0" cy="0" rx="10" ry="2.5" fill="#5A2D0A" opacity="0.7"/>
    </g>

    <!-- Dates on saucer -->
    <g transform="translate(30 -14)">
      <ellipse cx="0" cy="6" rx="26" ry="5" fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.5"/>
      <ellipse cx="-10" cy="1"  rx="5" ry="3.5" fill="#7A3E1A"/>
      <ellipse cx="0"   cy="-1" rx="5" ry="3.5" fill="#7A3E1A"/>
      <ellipse cx="10"  cy="1"  rx="5" ry="3.5" fill="#7A3E1A"/>
      <ellipse cx="-5"  cy="-4" rx="5" ry="3.5" fill="#8B4A22"/>
      <ellipse cx="5"   cy="-4" rx="5" ry="3.5" fill="#8B4A22"/>
    </g>

    <!-- Documents / papers -->
    <g transform="translate(110 -20)">
      <rect x="-30" y="-6" width="60" height="18" rx="2" fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.4" transform="rotate(-6)"/>
      <rect x="-30" y="-6" width="60" height="18" rx="2" fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.4" transform="rotate(3)"/>
      <line x1="-22" y1="0" x2="18" y2="0" stroke="#3DAFB9" stroke-opacity="0.4" stroke-width="0.8"/>
      <line x1="-22" y1="4" x2="14" y2="4" stroke="#3DAFB9" stroke-opacity="0.4" stroke-width="0.8"/>
    </g>

    <!-- Laptop with chart -->
    <g transform="translate(180 -28)">
      <path d="M-32,0 L32,0 L28,-30 L-28,-30 Z" fill="#2D4B7E"/>
      <rect x="-24" y="-27" width="48" height="24" rx="1" fill="#F0F9FA"/>
      <!-- Mini chart -->
      <polyline points="-20,-6 -12,-12 -4,-8 4,-16 12,-11 20,-19" fill="none" stroke="#3DAFB9" stroke-width="1.2"/>
      <circle cx="20" cy="-19" r="1.5" fill="#3DAFB9"/>
      <rect x="-34" y="0" width="68" height="3" rx="1.5" fill="#1F3A66"/>
    </g>
  </g>

  <!-- ═════ Two consultants ═════ -->
  <!-- Consultant A: Saudi male (ghutra + thobe), on the RIGHT -->
  <g transform="translate(575 660)">
    <!-- Thobe (body) -->
    <path d="M-72,120 C-72,30 -36,-20 0,-20 C36,-20 72,30 72,120 L60,120 L-60,120 Z" fill="url(#atThobe)" stroke="#3DAFB9" stroke-opacity="0.35" stroke-width="1"/>
    <!-- Thobe collar V -->
    <path d="M-8,-15 L0,-2 L8,-15" fill="none" stroke="#3DAFB9" stroke-opacity="0.55" stroke-width="1.5"/>
    <!-- Bisht trim / subtle vertical seams -->
    <line x1="0" y1="10" x2="0" y2="115" stroke="#3DAFB9" stroke-opacity="0.15" stroke-width="0.6"/>

    <!-- Neck -->
    <path d="M-10,-30 L-10,-20 C-10,-14 -6,-10 0,-10 C6,-10 10,-14 10,-20 L10,-30 Z" fill="url(#atSkin)"/>

    <!-- Head -->
    <ellipse cx="0" cy="-58" rx="34" ry="40" fill="url(#atSkin)"/>

    <!-- Ghutra (white keffiyeh) -->
    <path d="M-42,-72 C-52,-108 -32,-125 0,-125 C32,-125 52,-108 42,-72
             L48,-42 L46,-14 L28,-8 C18,-4 -18,-4 -28,-8 L-46,-14 L-48,-42 Z"
          fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Ghutra shadow/fold -->
    <path d="M-30,-96 C-20,-108 20,-108 30,-96" stroke="#3DAFB9" stroke-opacity="0.25" stroke-width="1" fill="none"/>
    <path d="M-46,-14 C-40,-4 -30,4 -20,10" stroke="#3DAFB9" stroke-opacity="0.35" stroke-width="1" fill="none"/>
    <path d="M46,-14 C40,-4 30,4 20,10" stroke="#3DAFB9" stroke-opacity="0.35" stroke-width="1" fill="none"/>

    <!-- Igal (black cord double loop) -->
    <ellipse cx="0" cy="-108" rx="34" ry="6" fill="#1E293B"/>
    <ellipse cx="0" cy="-104" rx="34" ry="6" fill="#1E293B" opacity="0.85"/>

    <!-- Facial features -->
    <ellipse cx="-10" cy="-60" rx="1.8" ry="2.5" fill="#1E293B"/>
    <ellipse cx="10"  cy="-60" rx="1.8" ry="2.5" fill="#1E293B"/>
    <!-- Beard hint -->
    <path d="M-15,-40 C-10,-30 10,-30 15,-40" stroke="#1E293B" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>
    <!-- Nose -->
    <path d="M0,-55 L-2,-46 L2,-46 Z" fill="#D4A583" opacity="0.6"/>
    <!-- Smile -->
    <path d="M-6,-38 C-3,-35 3,-35 6,-38" stroke="#8B5E2B" stroke-opacity="0.7" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Hand gesture (holding tablet/gesturing) -->
    <ellipse cx="-40" cy="60" rx="10" ry="14" fill="url(#atSkin)"/>
  </g>

  <!-- Consultant B: Saudi female (hijab + blazer), on the LEFT -->
  <g transform="translate(325 670)">
    <!-- Blazer body -->
    <path d="M-70,110 C-70,25 -34,-18 0,-18 C34,-18 70,25 70,110 L60,110 L-60,110 Z" fill="url(#atBlazer)" stroke="#3DAFB9" stroke-opacity="0.35" stroke-width="1"/>
    <!-- Blazer lapels -->
    <path d="M-14,-10 L0,20 L14,-10 L8,-16 L-8,-16 Z" fill="#F0F9FA" opacity="0.9"/>
    <path d="M-14,-10 L-8,-16 M14,-10 L8,-16" stroke="#3DAFB9" stroke-opacity="0.55" stroke-width="1"/>
    <!-- Buttons -->
    <circle cx="0" cy="30" r="2" fill="#6BC8D2"/>
    <circle cx="0" cy="50" r="2" fill="#6BC8D2"/>

    <!-- Neck (mostly covered by hijab) -->
    <path d="M-8,-24 L8,-24 L8,-16 L-8,-16 Z" fill="url(#atSkin)"/>

    <!-- Face -->
    <ellipse cx="0" cy="-52" rx="30" ry="36" fill="url(#atSkin)"/>

    <!-- Hijab (elegant teal drape) -->
    <path d="M-42,-56 C-52,-96 -30,-118 0,-118 C30,-118 52,-96 42,-56
             L44,-24 L38,-4 C30,4 -30,4 -38,-4 L-44,-24 Z"
          fill="url(#atBlazer)" stroke="#6BC8D2" stroke-opacity="0.6" stroke-width="1"/>
    <!-- Hijab lighter drape overlay -->
    <path d="M-36,-56 C-46,-90 -28,-108 0,-108 C28,-108 46,-90 36,-56"
          fill="none" stroke="#6BC8D2" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Hijab folds cascade -->
    <path d="M-38,-20 C-30,-4 30,-4 38,-20" stroke="#6BC8D2" stroke-opacity="0.35" stroke-width="1" fill="none"/>

    <!-- Facial features -->
    <ellipse cx="-9" cy="-54" rx="1.6" ry="2.3" fill="#1E293B"/>
    <ellipse cx="9"  cy="-54" rx="1.6" ry="2.3" fill="#1E293B"/>
    <!-- Nose -->
    <path d="M0,-50 L-2,-42 L2,-42 Z" fill="#D4A583" opacity="0.5"/>
    <!-- Lips -->
    <path d="M-6,-34 C-3,-31 3,-31 6,-34" stroke="#C97064" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Hand holding notebook -->
    <g transform="translate(45 55)">
      <ellipse cx="0" cy="-6" rx="9" ry="12" fill="url(#atSkin)"/>
      <rect x="-14" y="6" width="34" height="26" rx="2" fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.55"/>
      <line x1="-8" y1="14" x2="14" y2="14" stroke="#3DAFB9" stroke-opacity="0.5" stroke-width="0.8"/>
      <line x1="-8" y1="20" x2="10" y2="20" stroke="#3DAFB9" stroke-opacity="0.5" stroke-width="0.8"/>
      <line x1="-8" y1="26" x2="14" y2="26" stroke="#3DAFB9" stroke-opacity="0.5" stroke-width="0.8"/>
    </g>
  </g>

  <!-- ═════ Foreground sparkles / floating particles ═════ -->
  <g opacity="0.55">
    <circle cx="140" cy="240" r="3" fill="#3DAFB9"/>
    <circle cx="800" cy="380" r="4" fill="#6BC8D2"/>
    <circle cx="120" cy="480" r="2.5" fill="#3DAFB9"/>
    <circle cx="780" cy="230" r="2.5" fill="#3DAFB9"/>
    <g transform="translate(750 460)"><path d="M0,-5 L1.5,-1.5 L5,0 L1.5,1.5 L0,5 L-1.5,1.5 L-5,0 L-1.5,-1.5 Z" fill="#6BC8D2"/></g>
  </g>
</svg>
