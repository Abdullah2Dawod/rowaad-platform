<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ptBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2340"/>
      <stop offset="100%" stop-color="#2D4B7E"/>
    </linearGradient>
    <radialGradient id="ptGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#3DAFB9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3DAFB9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ptArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6BC8D2"/>
      <stop offset="100%" stop-color="#3DAFB9"/>
    </linearGradient>
    <pattern id="ptGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#6BC8D2" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="800" fill="url(#ptBg)"/>
  <rect width="800" height="800" fill="url(#ptGrid)"/>
  <rect width="800" height="800" fill="url(#ptGlow)"/>

  <!-- Desert-dune curves at bottom -->
  <path d="M0,720 C150,680 300,700 400,660 C500,620 650,650 800,610 L800,800 L0,800 Z"
        fill="#3DAFB9" fill-opacity="0.08"/>
  <path d="M0,760 C200,730 400,750 600,720 C700,705 750,715 800,700 L800,800 L0,800 Z"
        fill="#6BC8D2" fill-opacity="0.06"/>

  <!-- Saudi khatam (8-point) motif -->
  <g transform="translate(140 160)" opacity="0.18">
    <path d="M0,-70 L20,-20 L70,0 L20,20 L0,70 L-20,20 L-70,0 L-20,-20 Z" fill="none" stroke="#6BC8D2" stroke-width="1.5"/>
  </g>
  <g transform="translate(660 640)" opacity="0.18">
    <path d="M0,-55 L16,-16 L55,0 L16,16 L0,55 L-16,16 L-55,0 L-16,-16 Z" fill="none" stroke="#6BC8D2" stroke-width="1.5"/>
  </g>

  <!-- Target rings -->
  <g transform="translate(400 400)">
    <circle r="220" fill="#0F2340" stroke="#3DAFB9" stroke-opacity="0.25" stroke-width="1"/>
    <circle r="180" fill="none" stroke="#6BC8D2" stroke-opacity="0.35" stroke-width="1"/>
    <circle r="140" fill="none" stroke="#6BC8D2" stroke-opacity="0.5"  stroke-width="1.5"/>
    <circle r="100" fill="none" stroke="#3DAFB9" stroke-width="2"/>
    <circle r="60"  fill="#3DAFB9" fill-opacity="0.15" stroke="#6BC8D2" stroke-width="1.5"/>
    <circle r="30"  fill="#3DAFB9" fill-opacity="0.35"/>
    <circle r="12"  fill="#6BC8D2"/>

    <!-- Crosshairs -->
    <line x1="-240" y1="0" x2="-100" y2="0" stroke="#6BC8D2" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="100"  y1="0" x2="240"  y2="0" stroke="#6BC8D2" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="0" y1="-240" x2="0" y2="-100" stroke="#6BC8D2" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 4"/>
    <line x1="0" y1="100"  x2="0" y2="240"  stroke="#6BC8D2" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 4"/>

    <!-- Arrow hitting bullseye -->
    <g transform="rotate(-35)">
      <line x1="-260" y1="0" x2="0" y2="0" stroke="url(#ptArrow)" stroke-width="5" stroke-linecap="round"/>
      <path d="M-6,0 L-24,-12 L-24,12 Z" fill="#6BC8D2"/>
      <path d="M-260,0 L-274,-8 L-274,8 Z M-250,0 L-264,-8 L-264,8 Z" fill="#3DAFB9" opacity="0.9"/>
    </g>
  </g>

  <!-- Corner sparkles -->
  <g opacity="0.6">
    <circle cx="120" cy="640" r="3" fill="#6BC8D2"/>
    <circle cx="700" cy="180" r="3.5" fill="#3DAFB9"/>
  </g>
</svg>
