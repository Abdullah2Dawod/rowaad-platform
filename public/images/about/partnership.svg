<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="apBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F8FCFD"/>
      <stop offset="100%" stop-color="#E4F3F5"/>
    </linearGradient>
    <radialGradient id="apGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6BC8D2" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6BC8D2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="apThobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAF6F7"/>
    </linearGradient>
    <linearGradient id="apBlazer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B609B"/>
      <stop offset="100%" stop-color="#2D4B7E"/>
    </linearGradient>
    <linearGradient id="apSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D5B5"/>
      <stop offset="100%" stop-color="#E8BE93"/>
    </linearGradient>
    <linearGradient id="apRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DAFB9"/>
      <stop offset="100%" stop-color="#2D4B7E"/>
    </linearGradient>
  </defs>

  <rect width="700" height="560" fill="url(#apBg)"/>
  <rect width="700" height="560" fill="url(#apGlow)"/>

  <!-- ═════ Arabesque backdrop ═════ -->
  <g opacity="0.15" fill="none" stroke="#2D4B7E">
    <g transform="translate(120 100)">
      <path d="M0,-56 L16,-16 L56,0 L16,16 L0,56 L-16,16 L-56,0 L-16,-16 Z" stroke-width="1.5"/>
      <path d="M0,-36 L10,-10 L36,0 L10,10 L0,36 L-10,10 L-36,0 L-10,-10 Z" stroke-width="1"/>
    </g>
    <g transform="translate(580 460)">
      <path d="M0,-50 L14,-14 L50,0 L14,14 L0,50 L-14,14 L-50,0 L-14,-14 Z" stroke-width="1.5"/>
    </g>
    <g transform="translate(600 130)">
      <circle r="60" stroke-dasharray="3 6"/>
      <circle r="42"/>
    </g>
    <g transform="translate(100 440)">
      <circle r="52" stroke-dasharray="4 8"/>
    </g>
  </g>

  <!-- Ambient corner sparkles -->
  <g opacity="0.55">
    <g transform="translate(80 90)"><path d="M0,-6 L2,-2 L6,0 L2,2 L0,6 L-2,2 L-6,0 L-2,-2 Z" fill="#3DAFB9"/></g>
    <g transform="translate(620 100)"><path d="M0,-7 L2.2,-2.2 L7,0 L2.2,2.2 L0,7 L-2.2,2.2 L-7,0 L-2.2,-2.2 Z" fill="#6BC8D2"/></g>
    <g transform="translate(90 470)"><path d="M0,-5 L1.5,-1.5 L5,0 L1.5,1.5 L0,5 L-1.5,1.5 L-5,0 L-1.5,-1.5 Z" fill="#3DAFB9"/></g>
  </g>

  <!-- Central glowing ring -->
  <g transform="translate(350 280)">
    <circle r="140" fill="none" stroke="#3DAFB9" stroke-opacity="0.20" stroke-width="1" stroke-dasharray="3 7"/>
    <circle r="110" fill="none" stroke="#3DAFB9" stroke-opacity="0.30" stroke-width="1"/>
    <circle r="88"  fill="#FFFFFF" fill-opacity="0.6"/>
    <circle r="88"  fill="none" stroke="#6BC8D2" stroke-opacity="0.55" stroke-width="1.2"/>
  </g>

  <!-- ═════ Handshake ═════ -->
  <g transform="translate(350 280)">
    <!-- LEFT arm (Saudi male thobe) -->
    <g transform="translate(-155 12)">
      <!-- Sleeve -->
      <path d="M-60,-32 L54,-32 L54,44 L-60,44 Z" fill="url(#apThobe)" stroke="#3DAFB9" stroke-opacity="0.45" stroke-width="1.2"/>
      <!-- Cuff seam -->
      <path d="M54,-32 L54,44" stroke="#3DAFB9" stroke-opacity="0.55" stroke-width="2"/>
      <path d="M50,-32 L50,44" stroke="#6BC8D2" stroke-opacity="0.35" stroke-width="1"/>
      <!-- Delicate embroidery hint -->
      <line x1="-52" y1="-24" x2="46" y2="-24" stroke="#3DAFB9" stroke-opacity="0.18" stroke-width="0.6"/>
      <!-- Watch strap -->
      <rect x="24" y="-14" width="22" height="26" rx="4" fill="#1E293B"/>
      <rect x="27" y="-11" width="16" height="20" rx="2" fill="#F1FAFB"/>
      <circle cx="35" cy="-1" r="2" fill="#3DAFB9"/>
      <!-- Hand (wrist to fingers) -->
      <path d="M54,-30 C82,-30 118,-16 138,4 C148,16 146,32 128,40
               L94,42 C74,42 66,32 62,20 L54,-6 Z" fill="url(#apSkin)"/>
      <!-- Thumb -->
      <path d="M98,-6 C108,-8 116,-2 116,6 C116,14 110,18 102,18 C96,18 92,14 92,8 Z" fill="url(#apSkin)"/>
      <!-- Knuckle shading -->
      <path d="M100,10 C110,8 120,10 125,16" stroke="#C97F55" stroke-opacity="0.4" stroke-width="1" fill="none"/>
    </g>

    <!-- RIGHT arm (partner blazer) -->
    <g transform="translate(155 12)">
      <path d="M-54,-32 L60,-32 L60,44 L-54,44 Z" fill="url(#apBlazer)"/>
      <!-- Cuff seam -->
      <path d="M-54,-32 L-54,44" stroke="#6BC8D2" stroke-opacity="0.55" stroke-width="2"/>
      <path d="M-50,-32 L-50,44" stroke="#3DAFB9" stroke-opacity="0.4" stroke-width="1"/>
      <!-- Cuff button -->
      <circle cx="-42" cy="0" r="2.5" fill="#6BC8D2"/>
      <!-- Hand -->
      <path d="M-54,-30 C-82,-30 -118,-16 -138,4 C-148,16 -146,32 -128,40
               L-94,42 C-74,42 -66,32 -62,20 L-54,-6 Z" fill="url(#apSkin)"/>
      <!-- Thumb -->
      <path d="M-98,-6 C-108,-8 -116,-2 -116,6 C-116,14 -110,18 -102,18 C-96,18 -92,14 -92,8 Z" fill="url(#apSkin)"/>
      <path d="M-100,10 C-110,8 -120,10 -125,16" stroke="#C97F55" stroke-opacity="0.4" stroke-width="1" fill="none"/>
    </g>

    <!-- Central handshake overlap (fingers wrap) -->
    <g transform="translate(0 22)">
      <!-- Shadow -->
      <ellipse cx="0" cy="26" rx="46" ry="6" fill="#2D4B7E" fill-opacity="0.12"/>
      <!-- Interlocked hand -->
      <path d="M-46,-24 C-30,-30 -8,-30 0,-24 C8,-30 30,-30 46,-24
               L46,10 C42,20 32,22 22,20 C10,22 -10,22 -22,20 C-32,22 -42,20 -46,10 Z"
            fill="url(#apSkin)"/>
      <!-- Finger separators -->
      <path d="M-32,-20 Q-28,-8 -32,4" stroke="#C97F55" stroke-opacity="0.45" stroke-width="1" fill="none"/>
      <path d="M-16,-24 Q-12,-8 -16,6" stroke="#C97F55" stroke-opacity="0.45" stroke-width="1" fill="none"/>
      <path d="M0,-24 Q4,-8 0,6" stroke="#C97F55" stroke-opacity="0.45" stroke-width="1" fill="none"/>
      <path d="M16,-24 Q20,-8 16,6" stroke="#C97F55" stroke-opacity="0.45" stroke-width="1" fill="none"/>
      <path d="M32,-20 Q36,-8 32,4" stroke="#C97F55" stroke-opacity="0.45" stroke-width="1" fill="none"/>
      <!-- Highlight on top of grip -->
      <path d="M-40,-18 C-20,-24 20,-24 40,-18" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Sparkles emanating from handshake -->
    <g>
      <g transform="translate(-70 -70)"><path d="M0,-6 L2,-2 L6,0 L2,2 L0,6 L-2,2 L-6,0 L-2,-2 Z" fill="#3DAFB9"/></g>
      <g transform="translate(70 -78)"><path d="M0,-5 L1.5,-1.5 L5,0 L1.5,1.5 L0,5 L-1.5,1.5 L-5,0 L-1.5,-1.5 Z" fill="#3DAFB9"/></g>
      <g transform="translate(0 -105)"><path d="M0,-8 L2.5,-2.5 L8,0 L2.5,2.5 L0,8 L-2.5,2.5 L-8,0 L-2.5,-2.5 Z" fill="#6BC8D2"/></g>
      <g transform="translate(-105 -20)"><path d="M0,-4 L1.2,-1.2 L4,0 L1.2,1.2 L0,4 L-1.2,1.2 L-4,0 L-1.2,-1.2 Z" fill="#3DAFB9"/></g>
      <g transform="translate(105 -20)"><path d="M0,-4 L1.2,-1.2 L4,0 L1.2,1.2 L0,4 L-1.2,1.2 L-4,0 L-1.2,-1.2 Z" fill="#3DAFB9"/></g>
    </g>
  </g>

  <!-- ═════ Ribbon badge ═════ -->
  <g transform="translate(350 470)">
    <rect x="-110" y="-22" width="220" height="44" rx="22" fill="#FFFFFF" stroke="#3DAFB9" stroke-opacity="0.5" stroke-width="1.5"/>
    <rect x="-104" y="-16" width="208" height="32" rx="16" fill="none" stroke="url(#apRibbon)" stroke-opacity="0.35" stroke-width="1"/>
    <!-- Small emblem -->
    <g transform="translate(-82 0)">
      <circle r="12" fill="url(#apRibbon)"/>
      <path d="M-5,-1 L-1,3 L6,-4" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="16" y="6" text-anchor="middle" font-family="Arial, 'Segoe UI', sans-serif" font-weight="800" font-size="16" fill="#2D4B7E">شراكة موثوقة · منذ 2016</text>
  </g>
</svg>
